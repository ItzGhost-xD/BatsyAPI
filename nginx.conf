# /etc/nginx/sites-available/presence-api
# Reverse proxy with WebSocket upgrade support

upstream presence_api {
    least_conn;
    server 127.0.0.1:3000;
    # Add more when scaling: server 127.0.0.1:3001;
    keepalive 32;
}

server {
    listen 80;
    server_name your-domain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name your-domain.com;

    # SSL — use certbot to generate
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Compression
    gzip on;
    gzip_types application/json text/html;
    gzip_min_length 1000;

    # REST API
    location /v1/ {
        proxy_pass         http://presence_api;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # WebSocket upgrade
    location /ws {
        proxy_pass         http://presence_api;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;   # keep WS alive for 1h
        proxy_send_timeout 3600s;
    }

    # Swagger docs + health
    location ~ ^/(docs|health) {
        proxy_pass         http://presence_api;
        proxy_set_header   Host $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Root
    location / {
        proxy_pass http://presence_api;
    }
}
