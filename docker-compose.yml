version: "3.9"

services:
  api:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - REDIS_URL=redis://redis:6379
      - MONGODB_URI=mongodb://mongo:27017/discord_presence
      - ETAG_SECRET=${ETAG_SECRET:-change-me-in-production}
      - RATE_LIMIT_MAX=100
      - LOG_LEVEL=info
    depends_on:
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - presence-net

  # Scale horizontally: docker compose up --scale api=3
  # Each gets a different SHARD_ID via an env override

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save ""
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - presence-net
    volumes:
      - redis-data:/data

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=discord_presence
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/discord_presence --quiet
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - presence-net
    volumes:
      - mongo-data:/data/db

  # Optional: Redis UI for dev
  redis-commander:
    image: rediscommander/redis-commander:latest
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - presence-net
    profiles:
      - dev    # only starts with: docker compose --profile dev up

networks:
  presence-net:
    driver: bridge

volumes:
  redis-data:
  mongo-data:
